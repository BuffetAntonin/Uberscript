<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap pour un minimum de style -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <h1 class="text-center mb-5">Gestion de Menu Restaurant</h1>

    <div class="row mb-4">
        <div class="col-12">
            <div class="card shadow bg-primary text-white">
                <div class="card-body d-flex justify-content-between">
                    <h4 id="wallet">Argent : 0€</h4>
                </div>
            </div>
        </div>
    </div>
    
    <div class="row">

        <!-- Liste des repas -->
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">

                    <h5 class="card-title">Liste des repas</h5>

                    <ul id="mealList" class="list-group">
                        <!-- rempli dynamiquement -->
                    </ul>

                </div>
            </div>
        </div>

        <!-- Menu -->
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">

                    <h5 class="card-title">Menu</h5>

                    <ul id="menuList" class="list-group mb-3">
                        <!-- repas du menu -->
                    </ul>

                    <div class="d-grid gap-2">
                        <button id="calculateMenuBtn" class="btn btn-success">
                            Calculer le prix du menu
                        </button>
                    </div>

                    <div class="mt-3">

                        <p>
                            <strong>Total HT :</strong>
                            <span id="menuTotalHT">0</span> €
                        </p>

                        <p>
                            <strong>Total TTC :</strong>
                            <span id="menuTotalTTC">0</span> €
                        </p>

                    </div>

                </div>
            </div>
        </div>

        <div class="container mt-4">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="card-title">Historique des Commandes Réalisées</h5>
                    <ul id="orderHistory" class="list-group">
                        </ul>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- Script compilé depuis TypeScript -->
<script type="module" src="dist/app.js"></script>

</body>
</html>
